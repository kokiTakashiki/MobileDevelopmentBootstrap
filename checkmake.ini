# checkmake configuration
# Reference: https://github.com/checkmake/checkmake

[maxbodylength]
# Setup orchestration targets intentionally contain @echo guidance and shell
# control flow; the upstream default of 5 is too tight for that style.
# 25 still flags genuinely runaway bodies.
maxBodyLength = 25

[minphony]
# This Makefile orchestrates Mac setup, not a build, so the upstream
# defaults (all / clean / test) don't apply. Require only our top-level
# entry points.
required = setup,verify,lint
